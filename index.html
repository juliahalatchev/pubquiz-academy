<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17352f">
  <title>Pubquiz Academy</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg:#f5efe3; --ink:#1f2925; --green:#17352f; --gold:#c79a3b;
      --card:#fffdf8; --muted:#6c746f; --good:#1f7a4d; --bad:#a83a32;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:
      radial-gradient(circle at top,#fff8e7 0,#f5efe3 45%,#eadfc9 100%);color:var(--ink);min-height:100vh}
    .app{max-width:760px;margin:auto;padding:18px 16px 42px}
    header{background:linear-gradient(145deg,#21483f,#102a25);color:white;padding:22px;border-radius:24px;
      box-shadow:0 14px 35px rgba(23,53,47,.22);position:relative;overflow:hidden}
    header:after{content:"?";position:absolute;right:18px;top:-22px;font-size:120px;font-weight:900;color:rgba(255,255,255,.06)}
    h1{margin:0;font-size:clamp(30px,7vw,48px)} .tag{margin-top:6px;color:#f0d9a4}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
    .stat,.panel{background:rgba(255,255,255,.83);backdrop-filter:blur(8px);border:1px solid rgba(23,53,47,.08);
      border-radius:18px;padding:14px;box-shadow:0 8px 22px rgba(31,41,37,.07)}
    .stat strong{display:block;font-size:23px;color:var(--green)} .stat span{font-size:12px;color:var(--muted)}
    .panel{margin-top:14px;padding:18px}
    label{display:block;font-weight:700;margin-bottom:8px}
    select,button{font:inherit}
    select{width:100%;padding:13px;border:1px solid #d8d0bf;border-radius:12px;background:white}
    .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    button{border:0;border-radius:14px;padding:14px 16px;font-weight:800;cursor:pointer}
    .primary{background:var(--green);color:white} .secondary{background:#ead8ad;color:#3b2d12}
    .ghost{background:#eef1ed;color:var(--green)} .danger{background:#f5d9d6;color:#7d2a24}
    .hidden{display:none!important}
    .progress{height:9px;background:#e7dece;border-radius:999px;overflow:hidden;margin:16px 0}
    .bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#e0bb64);transition:.25s}
    .qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;gap:12px}
    .question{font-size:clamp(22px,5vw,31px);line-height:1.22;margin:18px 0}
    .options{display:grid;gap:10px}
    .option{text-align:left;background:white;border:2px solid #e5ddce;color:var(--ink)}
    .option:hover{border-color:var(--gold)} .option.correct{background:#dff2e7;border-color:var(--good)}
    .option.wrong{background:#f7dfdc;border-color:var(--bad)}
    .feedback{margin-top:16px;padding:14px;border-radius:14px;background:#f0eadf;line-height:1.45}
    .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap} .actions button{flex:1;min-width:130px}
    .resultTitle{font-size:34px;margin:0 0 8px} .bigScore{font-size:56px;font-weight:900;color:var(--green)}
    .small{font-size:13px;color:var(--muted);line-height:1.5}
    footer{text-align:center;color:var(--muted);font-size:12px;margin-top:22px}
    @media (max-width:520px){.stats{grid-template-columns:1fr 1fr} .stats .stat:last-child{grid-column:1/-1}}
  </style>
</head>
<body>
<div class="app">
<header>
  <h1>Pubquiz Academy</h1>
  <div class="tag">Träna brett. Minns smart. Svara innan bordet bredvid.</div>
</header>

<div class="stats">
  <div class="stat"><strong id="totalDone">0</strong><span>besvarade</span></div>
  <div class="stat"><strong id="accuracy">0%</strong><span>rätt totalt</span></div>
  <div class="stat"><strong id="streak">0</strong><span>bästa svit</span></div>
</div>

<section id="home" class="panel">
  <label for="category">Välj kategori</label>
  <select id="category">
    <option value="Alla">Alla kategorier</option>
  </select>
  <div class="modes">
    <button class="primary" data-action="normal">Blandat quiz</button>
    <button class="secondary" data-action="weak">Repetera felsvar</button>
    <button class="ghost" data-action="quick">Snabbrunda</button>
    <button class="danger" data-action="reset">Nollställ statistik</button>
  </div>
  <p class="small">Varje runda innehåller 10 frågor. Felsvar sparas lokalt på enheten och dyker oftare upp i repetitionsläget.</p>
</section>

<section id="quiz" class="panel hidden">
  <div class="qmeta"><span id="categoryLabel"></span><span id="counter"></span></div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div id="question" class="question"></div>
  <div id="options" class="options"></div>
  <div id="feedback" class="feedback hidden"></div>
  <div class="actions">
    <button id="nextBtn" class="primary hidden" data-action="next">Nästa fråga</button>
    <button class="ghost" data-action="home">Avsluta rundan</button>
  </div>
</section>

<section id="result" class="panel hidden">
  <h2 class="resultTitle">Rundan är klar 🍻</h2>
  <div id="score" class="bigScore"></div>
  <p id="resultText"></p>
  <div class="actions">
    <button class="primary" data-action="again">Kör igen</button>
    <button class="ghost" data-action="home">Till startsidan</button>
  </div>
</section>

<footer>All statistik sparas endast i din webbläsare.</footer>
</div>


<script>
document.addEventListener('DOMContentLoaded', function () {
  const QUESTIONS = [{"category": "Geografi", "q": "Vilken är Kanadas huvudstad?", "options": ["Toronto", "Vancouver", "Ottawa", "Montréal"], "answer": 2, "explanation": "Ottawa är Kanadas huvudstad. Toronto är landets största stad."}, {"category": "Geografi", "q": "Vilken är världens största ö, om Australien räknas som en kontinent?", "options": ["Borneo", "Madagaskar", "Grönland", "Nya Guinea"], "answer": 2, "explanation": "Grönland är världens största ö. Australien klassas normalt som en kontinent."}, {"category": "Geografi", "q": "Vilken flod rinner genom Budapest?", "options": ["Rhen", "Donau", "Seine", "Elbe"], "answer": 1, "explanation": "Donau delar Budapest i Buda och Pest."}, {"category": "Geografi", "q": "Vilket land har formen av en stövel?", "options": ["Portugal", "Grekland", "Italien", "Kroatien"], "answer": 2, "explanation": "Italien är den klassiska stövelformen på Europakartan."}, {"category": "Geografi", "q": "Vilken är Australiens huvudstad?", "options": ["Sydney", "Melbourne", "Canberra", "Perth"], "answer": 2, "explanation": "Canberra valdes som kompromiss mellan Sydney och Melbourne."}, {"category": "Geografi", "q": "Vilket hav ligger mellan Afrika och Arabiska halvön?", "options": ["Svarta havet", "Röda havet", "Arabiska havet", "Kaspiska havet"], "answer": 1, "explanation": "Röda havet skiljer nordöstra Afrika från Arabiska halvön."}, {"category": "Geografi", "q": "I vilket land ligger staden Dubrovnik?", "options": ["Montenegro", "Kroatien", "Slovenien", "Albanien"], "answer": 1, "explanation": "Dubrovnik ligger vid Adriatiska havet i södra Kroatien."}, {"category": "Geografi", "q": "Vilket är Europas längsta flod?", "options": ["Donau", "Volga", "Rhen", "Dnepr"], "answer": 1, "explanation": "Volga är Europas längsta flod."}, {"category": "Historia", "q": "Vilket år började andra världskriget i Europa?", "options": ["1918", "1933", "1939", "1941"], "answer": 2, "explanation": "Kriget började i Europa den 1 september 1939 när Tyskland invaderade Polen."}, {"category": "Historia", "q": "Vem var Sveriges kung när regalskeppet Vasa sjönk 1628?", "options": ["Gustav Vasa", "Gustav II Adolf", "Karl X Gustav", "Karl XI"], "answer": 1, "explanation": "Gustav II Adolf var kung när Vasa sjönk."}, {"category": "Historia", "q": "Vilket år föll Berlinmuren?", "options": ["1979", "1985", "1989", "1991"], "answer": 2, "explanation": "Berlinmuren öppnades den 9 november 1989."}, {"category": "Historia", "q": "Vilken civilisation byggde Machu Picchu?", "options": ["Maya", "Aztekerna", "Inka", "Olmekerna"], "answer": 2, "explanation": "Machu Picchu byggdes av Inkariket."}, {"category": "Historia", "q": "Vem blev Frankrikes kejsare 1804?", "options": ["Ludvig XIV", "Napoleon Bonaparte", "Robespierre", "Charles de Gaulle"], "answer": 1, "explanation": "Napoleon krönte sig till kejsare 1804."}, {"category": "Historia", "q": "Vilken stad begravdes av Vesuvius år 79?", "options": ["Sparta", "Pompeji", "Troja", "Kartago"], "answer": 1, "explanation": "Pompeji begravdes av aska och pimpsten från Vesuvius."}, {"category": "Historia", "q": "Vilket år blev Gustav Vasa kung av Sverige?", "options": ["1397", "1523", "1611", "1718"], "answer": 1, "explanation": "Gustav Vasa valdes till kung den 6 juni 1523."}, {"category": "Historia", "q": "Vad kallades den period av politisk och kulturell förändring som började i Italien på 1300-talet?", "options": ["Upplysningen", "Romantiken", "Renässansen", "Reformationen"], "answer": 2, "explanation": "Renässansen började i italienska stadsstater och spreds över Europa."}, {"category": "Sverige", "q": "Vilken är Sveriges största sjö?", "options": ["Vättern", "Mälaren", "Hjälmaren", "Vänern"], "answer": 3, "explanation": "Vänern är Sveriges och EU:s största sjö."}, {"category": "Sverige", "q": "Vilket är Sveriges högsta berg?", "options": ["Åreskutan", "Kebnekaise", "Sarektjåkkå", "Helags"], "answer": 1, "explanation": "Kebnekaise är Sveriges högsta berg."}, {"category": "Sverige", "q": "Vilken svensk stad kallas ofta Lilla London?", "options": ["Malmö", "Göteborg", "Uppsala", "Helsingborg"], "answer": 1, "explanation": "Göteborg har länge kallats Lilla London."}, {"category": "Sverige", "q": "Vilket landskap har en älg som landskapsdjur?", "options": ["Dalsland", "Jämtland", "Öland", "Blekinge"], "answer": 1, "explanation": "Älgen är Jämtlands landskapsdjur."}, {"category": "Sverige", "q": "Vad heter Sveriges äldsta universitet?", "options": ["Lunds universitet", "Uppsala universitet", "Stockholms universitet", "Göteborgs universitet"], "answer": 1, "explanation": "Uppsala universitet grundades 1477."}, {"category": "Sverige", "q": "Vilken svensk författare skapade figuren Pippi Långstrump?", "options": ["Selma Lagerlöf", "Tove Jansson", "Astrid Lindgren", "Elsa Beskow"], "answer": 2, "explanation": "Astrid Lindgren skapade Pippi Långstrump."}, {"category": "Sverige", "q": "Vilken älv rinner genom Luleå?", "options": ["Kalixälven", "Luleälven", "Piteälven", "Torne älv"], "answer": 1, "explanation": "Luleälven mynnar i Bottenviken vid Luleå."}, {"category": "Sverige", "q": "Vad heter bron mellan Sverige och Danmark?", "options": ["Stora Bältbron", "Öresundsbron", "Älvsborgsbron", "Svinesundsbron"], "answer": 1, "explanation": "Öresundsbron förbinder Malmö och Köpenhamnsområdet."}, {"category": "Film & TV", "q": "Vem regisserade filmen Titanic från 1997?", "options": ["Steven Spielberg", "James Cameron", "Ridley Scott", "Martin Scorsese"], "answer": 1, "explanation": "James Cameron skrev och regisserade Titanic."}, {"category": "Film & TV", "q": "Vad heter trollkarlen som spelas av Ian McKellen i Sagan om ringen?", "options": ["Saruman", "Gandalf", "Radagast", "Elrond"], "answer": 1, "explanation": "Ian McKellen spelar Gandalf."}, {"category": "Film & TV", "q": "I vilken stad utspelar sig TV-serien Friends huvudsakligen?", "options": ["Boston", "Chicago", "New York", "Los Angeles"], "answer": 2, "explanation": "Friends utspelar sig huvudsakligen på Manhattan i New York."}, {"category": "Film & TV", "q": "Vilken filmfigur säger ofta 'May the Force be with you'?", "options": ["Indiana Jones", "Rocky Balboa", "Figurer i Star Wars", "James Bond"], "answer": 2, "explanation": "Uttrycket hör till Star Wars-universumet."}, {"category": "Film & TV", "q": "Vad heter skolan i Harry Potter?", "options": ["Narnia", "Hogwarts", "Nevermore", "Xavier's School"], "answer": 1, "explanation": "Harry Potter studerar på Hogwarts skola för häxkonster och trolldom."}, {"category": "Film & TV", "q": "Vilken svensk regissör gjorde Det sjunde inseglet?", "options": ["Lasse Hallström", "Ingmar Bergman", "Roy Andersson", "Jan Troell"], "answer": 1, "explanation": "Ingmar Bergman regisserade Det sjunde inseglet."}, {"category": "Film & TV", "q": "Vad heter den gula familjen i den långlivade animerade TV-serien?", "options": ["The Griffins", "The Simpsons", "The Jetsons", "The Belchers"], "answer": 1, "explanation": "Familjen Simpson bor i Springfield."}, {"category": "Film & TV", "q": "Vilken skådespelare spelade huvudrollen i Forrest Gump?", "options": ["Tom Hanks", "Tom Cruise", "Brad Pitt", "Robin Williams"], "answer": 0, "explanation": "Tom Hanks spelar Forrest Gump."}, {"category": "Musik", "q": "Vilket svenskt band vann Eurovision 1974 med Waterloo?", "options": ["Roxette", "Ace of Base", "ABBA", "Europe"], "answer": 2, "explanation": "ABBA vann i Brighton 1974 med Waterloo."}, {"category": "Musik", "q": "Vem kallades The King of Pop?", "options": ["Prince", "Michael Jackson", "Elvis Presley", "David Bowie"], "answer": 1, "explanation": "Michael Jackson kallades The King of Pop."}, {"category": "Musik", "q": "Vilket band gav ut albumet The Dark Side of the Moon?", "options": ["Queen", "Pink Floyd", "Led Zeppelin", "The Who"], "answer": 1, "explanation": "Pink Floyd gav ut albumet 1973."}, {"category": "Musik", "q": "Vilket instrument har normalt 88 tangenter?", "options": ["Orgel", "Piano", "Dragspel", "Cembalo"], "answer": 1, "explanation": "Ett modernt standardpiano har 88 tangenter."}, {"category": "Musik", "q": "Vem komponerade Für Elise?", "options": ["Mozart", "Beethoven", "Bach", "Chopin"], "answer": 1, "explanation": "Für Elise tillskrivs Ludwig van Beethoven."}, {"category": "Musik", "q": "Vilken grupp bestod av John Lennon, Paul McCartney, George Harrison och Ringo Starr?", "options": ["The Rolling Stones", "The Beatles", "The Kinks", "The Who"], "answer": 1, "explanation": "De fyra utgjorde The Beatles klassiska uppsättning."}, {"category": "Musik", "q": "Vilken svensk artist sjunger Kom igen Lena!?", "options": ["Håkan Hellström", "Lars Winnerbäck", "Kent", "Magnus Uggla"], "answer": 0, "explanation": "Kom igen Lena! är en låt av Håkan Hellström."}, {"category": "Musik", "q": "Vad kallas den högsta kvinnliga sångrösten?", "options": ["Alt", "Mezzosopran", "Sopran", "Tenor"], "answer": 2, "explanation": "Sopran är den högsta vanliga kvinnliga rösttypen."}, {"category": "Sport", "q": "Hur många spelare har ett fotbollslag på planen vid avspark?", "options": ["9", "10", "11", "12"], "answer": 2, "explanation": "Ett lag startar med elva spelare inklusive målvakten."}, {"category": "Sport", "q": "Vilket land förknippas med sporten sumobrottning?", "options": ["Kina", "Japan", "Sydkorea", "Mongoliet"], "answer": 1, "explanation": "Sumo är Japans nationalsport."}, {"category": "Sport", "q": "Hur många ringar finns i den olympiska symbolen?", "options": ["4", "5", "6", "7"], "answer": 1, "explanation": "Den olympiska symbolen består av fem sammanlänkade ringar."}, {"category": "Sport", "q": "I vilken sport tävlar man om Stanley Cup?", "options": ["Basket", "Baseboll", "Ishockey", "Amerikansk fotboll"], "answer": 2, "explanation": "Stanley Cup är NHL:s mästerskapspokal."}, {"category": "Sport", "q": "Vilken tennisturnering spelas på gräs?", "options": ["US Open", "French Open", "Australian Open", "Wimbledon"], "answer": 3, "explanation": "Wimbledon spelas på gräs."}, {"category": "Sport", "q": "Vad kallas tre mål av samma spelare i en match?", "options": ["Grand slam", "Hat trick", "Triple double", "Clean sweep"], "answer": 1, "explanation": "Tre mål av samma spelare kallas hat trick."}, {"category": "Sport", "q": "Vilket land vann herrarnas fotbolls-VM 2018?", "options": ["Tyskland", "Frankrike", "Argentina", "Kroatien"], "answer": 1, "explanation": "Frankrike besegrade Kroatien i finalen 2018."}, {"category": "Sport", "q": "Hur lång är ett maraton?", "options": ["40,0 km", "41,195 km", "42,195 km", "43,0 km"], "answer": 2, "explanation": "Den officiella maratondistansen är 42,195 kilometer."}, {"category": "Vetenskap", "q": "Vilken planet ligger närmast solen?", "options": ["Venus", "Merkurius", "Mars", "Jorden"], "answer": 1, "explanation": "Merkurius är solsystemets innersta planet."}, {"category": "Vetenskap", "q": "Vad är den kemiska beteckningen för guld?", "options": ["Ag", "Gd", "Au", "Go"], "answer": 2, "explanation": "Guld har beteckningen Au, från latinets aurum."}, {"category": "Vetenskap", "q": "Hur många hjärtan har en bläckfisk?", "options": ["1", "2", "3", "4"], "answer": 2, "explanation": "Bläckfiskar har tre hjärtan."}, {"category": "Vetenskap", "q": "Vilket organ producerar insulin?", "options": ["Levern", "Bukspottkörteln", "Mjälten", "Sköldkörteln"], "answer": 1, "explanation": "Insulin produceras i bukspottkörtelns betaceller."}, {"category": "Vetenskap", "q": "Vad mäts i hertz?", "options": ["Energi", "Frekvens", "Tryck", "Temperatur"], "answer": 1, "explanation": "Hertz är enheten för frekvens, alltså svängningar per sekund."}, {"category": "Vetenskap", "q": "Vilket grundämne behöver vi för att andas?", "options": ["Kväve", "Syre", "Väte", "Helium"], "answer": 1, "explanation": "Människans cellandning kräver syre."}, {"category": "Vetenskap", "q": "Vad heter processen där växter omvandlar ljusenergi till kemisk energi?", "options": ["Jäsning", "Fotosyntes", "Osmos", "Respiration"], "answer": 1, "explanation": "Fotosyntesen använder ljus, koldioxid och vatten för att bilda energirika ämnen."}, {"category": "Vetenskap", "q": "Vilket är människokroppens största organ?", "options": ["Levern", "Huden", "Lungorna", "Tarmen"], "answer": 1, "explanation": "Huden är kroppens största organ."}, {"category": "Mat & dryck", "q": "Vilken spritsort är huvudingrediens i en klassisk mojito?", "options": ["Gin", "Rom", "Vodka", "Tequila"], "answer": 1, "explanation": "En klassisk mojito görs med ljus rom, lime, mynta, socker och sodavatten."}, {"category": "Mat & dryck", "q": "Från vilket land kommer rätten paella?", "options": ["Portugal", "Spanien", "Italien", "Frankrike"], "answer": 1, "explanation": "Paella kommer från Valenciaområdet i Spanien."}, {"category": "Mat & dryck", "q": "Vilken ost används traditionellt i en grekisk sallad?", "options": ["Brie", "Feta", "Cheddar", "Gouda"], "answer": 1, "explanation": "Feta är den klassiska osten i grekisk sallad."}, {"category": "Mat & dryck", "q": "Vad är huvudråvaran i hummus?", "options": ["Linser", "Kikärter", "Vita bönor", "Ärtor"], "answer": 1, "explanation": "Hummus görs främst av kikärter och tahini."}, {"category": "Mat & dryck", "q": "Vilket land är känt för drycken sake?", "options": ["Japan", "Kina", "Thailand", "Vietnam"], "answer": 0, "explanation": "Sake är en japansk alkoholhaltig dryck gjord på polerat ris."}, {"category": "Mat & dryck", "q": "Vilken kaffedryck består traditionellt av espresso och ångad mjölk med ett tunt lager skum?", "options": ["Espresso", "Cappuccino", "Caffè latte", "Americano"], "answer": 2, "explanation": "Caffè latte innehåller espresso och en större mängd ångad mjölk med tunt skum."}, {"category": "Mat & dryck", "q": "Vad heter den franska matlagningsmetoden där mat vakuumförpackas och tillagas i exakt temperatur?", "options": ["Flambering", "Sous vide", "Confitering", "Gratinering"], "answer": 1, "explanation": "Sous vide betyder ungefär 'under vakuum'."}, {"category": "Mat & dryck", "q": "Vilken dryck används i en klassisk Irish coffee?", "options": ["Rom", "Whisky", "Cognac", "Gin"], "answer": 1, "explanation": "Irish coffee görs med kaffe, irländsk whisky, socker och grädde."}];

  const els = {
    categorySelect: document.getElementById('category'),
    totalDone: document.getElementById('totalDone'),
    accuracy: document.getElementById('accuracy'),
    streak: document.getElementById('streak'),
    home: document.getElementById('home'),
    quiz: document.getElementById('quiz'),
    result: document.getElementById('result'),
    categoryLabel: document.getElementById('categoryLabel'),
    counter: document.getElementById('counter'),
    bar: document.getElementById('bar'),
    question: document.getElementById('question'),
    options: document.getElementById('options'),
    feedback: document.getElementById('feedback'),
    nextBtn: document.getElementById('nextBtn'),
    score: document.getElementById('score'),
    resultText: document.getElementById('resultText')
  };

  let state;
  try {
    state = JSON.parse(localStorage.getItem('pqa_stats')) || {done:0, correct:0, bestStreak:0, wrong:{}};
  } catch (e) {
    state = {done:0, correct:0, bestStreak:0, wrong:{}};
  }

  let round = [];
  let index = 0;
  let roundScore = 0;
  let streakNow = 0;
  let answered = false;
  let lastMode = 'normal';

  const categories = [...new Set(QUESTIONS.map(q => q.category))].sort();
  categories.forEach(c => {
    const option = document.createElement('option');
    option.value = c;
    option.textContent = c;
    els.categorySelect.appendChild(option);
  });

  function save() {
    try {
      localStorage.setItem('pqa_stats', JSON.stringify(state));
    } catch (e) {}
    renderStats();
  }

  function renderStats() {
    els.totalDone.textContent = state.done;
    els.accuracy.textContent = state.done ? Math.round(state.correct / state.done * 100) + '%' : '0%';
    els.streak.textContent = state.bestStreak;
  }

  function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function show(section) {
    [els.home, els.quiz, els.result].forEach(el => el.classList.add('hidden'));
    section.classList.remove('hidden');
  }

  function startQuiz(mode) {
    lastMode = mode;
    const selectedCategory = els.categorySelect.value;
    let pool = QUESTIONS.filter(q => selectedCategory === 'Alla' || q.category === selectedCategory);

    if (mode === 'weak') {
      const weak = pool.filter(q => state.wrong[q.q]);
      if (weak.length >= 3) pool = weak;
    }

    round = shuffle(pool).slice(0, Math.min(10, pool.length));
    index = 0;
    roundScore = 0;
    streakNow = 0;
    show(els.quiz);
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = round[index];
    els.categoryLabel.textContent = q.category;
    els.counter.textContent = (index + 1) + ' / ' + round.length;
    els.bar.style.width = (index / round.length * 100) + '%';
    els.question.textContent = q.q;
    els.options.innerHTML = '';
    els.feedback.classList.add('hidden');
    els.nextBtn.classList.add('hidden');

    q.options.forEach((opt, i) => {
      const button = document.createElement('button');
      button.className = 'option';
      button.type = 'button';
      button.textContent = opt;
      button.addEventListener('click', () => answer(i, button));
      els.options.appendChild(button);
    });
  }

  function answer(choice, button) {
    if (answered) return;
    answered = true;
    const q = round[index];
    const buttons = Array.from(els.options.querySelectorAll('.option'));

    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === q.answer) b.classList.add('correct');
    });

    state.done++;

    if (choice === q.answer) {
      roundScore++;
      state.correct++;
      streakNow++;
      state.bestStreak = Math.max(state.bestStreak, streakNow);

      if (state.wrong[q.q]) {
        state.wrong[q.q]--;
        if (state.wrong[q.q] <= 0) delete state.wrong[q.q];
      }
      els.feedback.innerHTML = '<strong>Rätt!</strong> ' + q.explanation;
    } else {
      button.classList.add('wrong');
      streakNow = 0;
      state.wrong[q.q] = (state.wrong[q.q] || 0) + 1;
      els.feedback.innerHTML = '<strong>Inte riktigt.</strong> ' + q.explanation;
    }

    els.feedback.classList.remove('hidden');
    els.nextBtn.classList.remove('hidden');
    save();
  }

  function nextQuestion() {
    index++;
    if (index >= round.length) {
      finish();
    } else {
      showQuestion();
    }
  }

  function finish() {
    show(els.result);
    els.bar.style.width = '100%';
    els.score.textContent = roundScore + ' / ' + round.length;
    const pct = Math.round(roundScore / round.length * 100);
    els.resultText.textContent =
      pct >= 90 ? 'Quizorakel. Någon bör vakta pokalen.' :
      pct >= 70 ? 'Starkt! Du är farligt nära pubquiz-form.' :
      pct >= 50 ? 'Bra grund. Felsvaren är nu träningsbränsle.' :
                  'Perfekt startpunkt. Repetitionsläget vet vad det ska göra.';
  }

  function goHome() {
    show(els.home);
  }

  function resetStats() {
    const confirmed = window.confirm('Nollställa all sparad statistik och alla felsvar?');
    if (!confirmed) return;
    state = {done:0, correct:0, bestStreak:0, wrong:{}};
    save();
  }

  document.querySelector('[data-action="normal"]').addEventListener('click', () => startQuiz('normal'));
  document.querySelector('[data-action="weak"]').addEventListener('click', () => startQuiz('weak'));
  document.querySelector('[data-action="quick"]').addEventListener('click', () => startQuiz('quick'));
  document.querySelector('[data-action="reset"]').addEventListener('click', resetStats);
  document.querySelector('[data-action="next"]').addEventListener('click', nextQuestion);
  document.querySelectorAll('[data-action="home"]').forEach(btn => btn.addEventListener('click', goHome));
  document.querySelector('[data-action="again"]').addEventListener('click', () => startQuiz(lastMode));

  renderStats();
});
</script>

</body>
</html>
