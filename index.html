<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#163a34">
  <title>Pubquiz Academy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div class="logo">QA</div>
      <div>
        <strong>Pubquiz Academy</strong>
        <span>Design Edition · 0.5</span>
      </div>
    </header>

    <section id="home" class="screen">
      <div class="hero">
        <span class="eyebrow">TRÄNA SMARTARE</span>
        <h1>Lite varje dag.<br>Livsfarlig på quiz.</h1>
        <p>1 000 frågor, smart repetition och en renare väg från tvekan till träffsäkerhet.</p>
      </div>

      <button data-mode="daily" class="primary-card">
        <div class="icon-circle">✦</div>
        <div>
          <strong>Dagens quiz</strong>
          <span>15 frågor · samma runda hela dagen</span>
        </div>
        <span class="arrow">→</span>
      </button>

      <section class="stats-strip" aria-label="Din statistik">
        <div><strong id="answered">0</strong><span>Besvarade</span></div>
        <div><strong id="accuracy">0%</strong><span>Rätt</span></div>
        <div><strong id="bestStreak">0</strong><span>Bästa svit</span></div>
        <div><strong id="level">Pubnovis</strong><span>Nivå</span></div>
      </section>

      <section class="section-block">
        <div class="section-title">
          <div>
            <span class="eyebrow">VÄLJ LÄGE</span>
            <h2>Vad vill du träna?</h2>
          </div>
        </div>

        <div class="mode-list">
          <button data-mode="normal" class="mode-row">
            <span class="mode-icon">10</span>
            <span><strong>Klassisk runda</strong><small>Tio blandade frågor</small></span>
            <span>›</span>
          </button>
          <button data-mode="bishops" class="mode-row">
            <span class="mode-icon">30</span>
            <span><strong>Kvällens Bishops</strong><small>En längre pubquizrunda</small></span>
            <span>›</span>
          </button>
          <button data-mode="weak" class="mode-row">
            <span class="mode-icon">↻</span>
            <span><strong>Repetera felsvar</strong><small>Fokusera där du missar</small></span>
            <span>›</span>
          </button>
          <button data-mode="quick" class="mode-row">
            <span class="mode-icon">60</span>
            <span><strong>Snabbrunda</strong><small>Så många du hinner på en minut</small></span>
            <span>›</span>
          </button>
        </div>
      </section>

      <section class="section-block settings-block">
        <div class="field">
          <label for="category">Kategori</label>
          <select id="category"><option value="Alla">Alla kategorier</option></select>
        </div>
        <div class="field">
          <label for="difficulty">Svårighetsgrad</label>
          <select id="difficulty">
            <option value="Alla">Blandad</option>
            <option value="1">Lätt</option>
            <option value="2">Medel</option>
            <option value="3">Svår</option>
          </select>
        </div>
      </section>

      <section id="insight" class="insight-card"></section>
    </section>

    <section id="quiz" class="screen hidden">
      <div class="quiz-top">
        <button id="quit" class="icon-button" aria-label="Avsluta">×</button>
        <div class="quiz-meta">
          <span id="qCategory"></span>
          <strong id="counter"></strong>
        </div>
        <div id="timer" class="timer hidden"></div>
      </div>

      <div class="progress"><div id="progressBar"></div></div>

      <article class="question-panel">
        <h2 id="question"></h2>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback hidden"></div>
      </article>
    </section>

    <section id="result" class="screen hidden">
      <article class="result-panel">
        <span class="eyebrow">RUNDAN ÄR KLAR</span>
        <div id="score" class="score"></div>
        <h2 id="resultTitle"></h2>
        <p id="resultText"></p>
        <div id="categoryBreakdown" class="breakdown"></div>
        <div class="result-actions">
          <button id="again" class="primary-button">Kör igen</button>
          <button id="homeBtn" class="secondary-button">Startsidan</button>
        </div>
      </article>
    </section>

    <footer>Pubquiz Academy · 1 000 frågor</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
